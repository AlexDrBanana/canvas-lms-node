name: CI

on:
    push:
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test:
        name: Test
        runs-on: ubuntu-latest
        env:
            CANVAS_API_KEY: ${{ secrets.CANVAS_API_KEY }}
            CANVAS_BASE_URL: ${{ secrets.CANVAS_BASE_URL }}

        steps:
            - name: Check out repository
              uses: actions/checkout@v5

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: latest
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              run: npm test

            - name: Build package
              run: npm run build
